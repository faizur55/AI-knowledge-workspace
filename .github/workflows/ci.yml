name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # Full install pulls in torch via sentence-transformers, which is
          # slow in CI. The test suite stubs those out (see tests/stubs),
          # so we only need the lightweight deps to run it.
          pip install fastapi uvicorn sqlalchemy pydantic pydantic-settings \
            python-dotenv email-validator "python-jose[cryptography]" \
            "bcrypt==4.2.1" rank-bm25 prometheus-client \
            python-multipart pytest httpx

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build
