server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: let React Router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket (live collaboration): needs the Upgrade/Connection headers
    # the generic /api/ block below deliberately clears for SSE streaming,
    # so this gets its own location matched first (more specific prefix).
    location /api/ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;  # keep long-lived WS connections open
    }

    # Reverse-proxy API calls to the backend container so the browser only
    # ever talks to one origin (avoids CORS entirely in production).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;              # needed for SSE /chat/ streaming
        proxy_read_timeout 300s;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }
}
